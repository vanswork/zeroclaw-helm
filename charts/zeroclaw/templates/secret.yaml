{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zeroclaw.secretName" . }}
  labels:
    {{- include "zeroclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.data.discordBotToken }}
  {{ .Values.secrets.keys.discordBotToken }}: {{ .Values.secrets.data.discordBotToken | quote }}
  {{- end }}
  {{- if .Values.secrets.data.githubAppPrivateKeyPem }}
  {{ .Values.secrets.keys.githubAppPrivateKeyPem }}: |
{{ .Values.secrets.data.githubAppPrivateKeyPem | nindent 4 }}
  {{- end }}
{{- end }}
